<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">

    <style>
        /* Custom Form Styling to complement your theme */

        body { font-family: "Bricolage Grotesque", sans-serif; 
    padding: 20px; }

            /*https://www.w3schools.com/howto/howto_js_sidenav.asp*/

body{
    background-color: #f0f1f5 ;
}

nav{
    height: 100%;
    width:200px;
    position: fixed;
    top:0;
    left:0;
    background-color: #154c4b;
    overflow-x: hidden;
    padding:20px;
}

nav p{
    font-weight: bold;
    color: #8bc1c0  ;
    padding-bottom: 10px;
    margin-top: 0;
}

nav hr {
    margin-bottom: 30px;
    border: 0; 
    border-top: 1px solid #aaa9a9;
    margin-left: 0;
}

nav a {
    text-decoration: none;
    font-size: 15px;
    color: #aaa9a9;
    display: block;
    transition: 0.3s;
    align-items: left;
    font-weight:bold;
    margin-bottom:0px
}

nav a:hover{
    background-color: #219e75;
    color: #f0f1f5;
    padding:12px;
    cursor:pointer;
}

.main{
    margin-left:250px;
}

.main hr{
    color:#aaa9a9;
}

 #title{
    color: #aaa9a9;
    font-size:30px;
    padding-bottom:8px;
}

header {
    font-size:50px;
    color:#154c4b;
    padding-top:10px;
}

#subtitle{
    color: #aaa9a9;
    font-size: 20px;
}

.container{
    display:flex;
}

.box{
    background-color: white;
    box-shadow: black;
    text-align: center;
    margin-top:30px;
    margin-right:100px;
    width:300px;
    padding:20px 20px 20px;
    border-radius: 40px;
    box-shadow: 15px 15px 20px grey;
    transition: 0.3s ease;
}

.box:hover{
    transform: translateY(-10px);
    box-shadow: 15px 25px 30px rgba(0,0,0,0.2);
}

.fa-user{
    font-size:50px;
}

.box h1{
    padding-bottom: 1px;
}

.box p{
    color:#aaa9a9;
}

.box button{
    background-color: #154c4b;
    color: white;
    font-family: "Bricolage Grotesque";
    font-size:20px;
    font-weight:bold;
    width:250px;
    height:50px;
    border-radius: 30px;
    cursor:pointer;
    transition:0.3s;
}

.box button:hover{
    background-color: #219e75;
                
}

.assessment-card {
    background-color: white;
    max-width: 600px;
    margin-top: 30px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.05);
}

.assessment-card h2 {
    text-align: center;
    color: #154c4b;
    margin-bottom: 30px;
}

.input-group {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.input-group label {
    font-weight: bold;
    color: #555;
}

.input-group input[type="number"] {
    width: 60px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-family: inherit;
    text-align: center;
}

.feedback-group {
    margin-top: 20px;
}

.feedback-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
    color: #555;
}

.feedback-group textarea {
    width: 100%;
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 12px;
    font-family: inherit;
    box-sizing: border-box;
    resize: vertical;
}

.button-container {
    margin-top: 30px;
    display: flex;
    align-items: center;
    gap: 20px;
}

.btn-update {
    background-color: #154c4b;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-update:hover {
    background-color: #219e75;
}

.btn-cancel {
    text-decoration: none;
    color: #721c24;
    font-weight: bold;
    font-size: 16px;
}

.btn-cancel:hover {
    text-decoration: underline;
}
    </style>
</head>
<body>

    <nav>
        <p>DASHBOARD</p>
        <hr>
        <a href="#">Home</a>
        <a href="#">Assessments</a>
        <a href="#">Students</a>
        <a href="#">Settings</a>
    </nav>

    <div class="main">
        <header>Create Assessment for: Jicken Jockey</header>
        <p id="subtitle">Role: <strong>Lecturer</strong></p>
        <hr>

        <div class="assessment-card">
            <h2>Grades (Scale 1-10)</h2>
            
            <form action="#">
                <div class="input-group">
                    <label>Understanding of Project</label>
                    <input type="number" min="1" max="10" value="1">
                </div>

                <div class="input-group">
                    <label>Health and Safety</label>
                    <input type="number" min="1" max="10" value="9">
                </div>

                <div class="input-group">
                    <label>Connectivity</label>
                    <input type="number" min="1" max="10" value="4">
                </div>

                <div class="input-group">
                    <label>Presentation</label>
                    <input type="number" min="1" max="10" value="2">
                </div>

                <div class="input-group">
                    <label>Clarity</label>
                    <input type="number" min="1" max="10" value="1">
                </div>

                <div class="input-group">
                    <label>Activities</label>
                    <input type="number" min="1" max="10" value="2">
                </div>

                <div class="input-group">
                    <label>Project Management</label>
                    <input type="number" min="1" max="10" value="3">
                </div>

                <div class="input-group">
                    <label>Time Management</label>
                    <input type="number" min="1" max="10" value="4">
                </div>

                <div class="feedback-group">
                    <label>General Feedback</label>
                    <textarea rows="4" placeholder="chicken jockeyyy"></textarea>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-update">Update Assessment</button>
                    <a href="#" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
