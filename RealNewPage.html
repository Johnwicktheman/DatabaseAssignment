<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="margin: 0px; background-color: #10253b;background-image: linear-gradient(rgba(16, 37, 59, 0.8), rgba(16, 37, 59, 0.8)),url('Assets/NottImage2.png');background-size: cover; background-repeat: no-repeat; background-position: center center; min-height: 100vh ;" >
    <div style="background-color: rgb(255, 255, 255); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
  
        <div style="background-color: rgb(255, 255, 255);">
            <img src="Assets/UniLogo.png" style="width:200px; height: auto; margin: 20px 40px;">
        </div>
        <div style="margin-right: 20px; margin-left: 40px;">
            <p style="font-size: 30px;">Home Page</p>
        </div>
        
    </div>
    <div style=" display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <div style="font-size: 8vw; color: white; margin-left: 40px;">
            <p style="word-break: normal;">
                Internship <br>Management
            </p>
        </div>
        <div style="background-color: white; width: 550px; height: 500px; margin: 20px ; margin-right: 60px; border: 4px solid silver; border-radius: 30px;">
            <div style="background-color: rgb(255, 255, 255); margin: 20px 30px; display: flex; flex-direction: column;">
                <p style="font-size: 50px;">
                <strong>Log in your account</strong>
            </div>
            <div style="background-color: rgb(255, 255, 255); margin: 40px; display: flex; flex-direction: column;">
                <form style="display: flex; flex-direction: column; row-gap: 30px;">
                    <input type="text" placeholder="Enter Username... " required style="font-size: 25px; border-radius: 1px; border: 3px solid #C0C0C0; width: 300px;">
                    <input type="password" placeholder="Enter Password..." required style="font-size: 25px ;border-radius: 1px; border: 3px solid #C0C0C0; width: 300px;">
                    <div>
                        <input type="checkbox" id="remember" style=" vertical-align:middle;width: 18px; height: 18px; cursor: pointer;">
                        <label for="remember" style="vertical-align:middle;font-weight: bold; font-size: 18px; cursor: pointer;">Remember me</label>
                    </div>
                    
                    <button type="submit" style="margin-left:200px;background-color: #10253b;font-weight: bold; color: white;font-size: 20px; cursor: pointer;text-align: center; height: 40px;">Continue</button>
                    
                    
                </form>
            </div>
            
            
        </div>
    </div>
</body>
    

</html>
