<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management – Internship Assessment System</title>
  <link rel="stylesheet" href="user_management.css">

</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <nav>
      <a href="admin_dashboard.php">Dashboard</a>
      <a href="user_management.php" class="active">User Management</a>
      <a href="assessor_accounts.php">Assessor Accounts</a>
      <a href="internship_management.php">Internship Management</a>
      <a href="results.php">Result Viewing</a>
    </nav>
    <a href="logout.php" class="logout">Logout</a>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <div class="page-header">
      <h1>User Management</h1>
      <button class="btn btn-primary" onclick="openModal('add')">+ Add Student</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name or student ID..." oninput="filterTable()" />
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table id="userTable">
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows inserted by JS below (in real app this comes from PHP/MySQL) -->
        </tbody>
      </table>
    </div>

  </main>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Add Student</h2>

      <div class="form-group">
        <label for="mStudentId">Student ID</label>
        <input type="text" id="mStudentId" placeholder="e.g. S12345" />
      </div>

      <div class="form-group">
        <label for="mName">Full Name</label>
        <input type="text" id="mName" placeholder="Full name" />
      </div>

      <div class="form-group">
        <label for="mEmail">Email</label>
        <input type="email" id="mEmail" placeholder="student@example.com" />
      </div>

      <div class="form-group">
        <label for="mRole">Role</label>
        <select id="mRole">
          <option value="Student">Student</option>
          <option value="Admin">Admin</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveUser()">Save</button>
      </div>
    </div>
  </div>

  <script src="user_management.js">

  </script>

</body>
</html>
